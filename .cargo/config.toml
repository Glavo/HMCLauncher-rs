include = [{ path = "local.toml", optional = true }]

[build]
target = "i686-win7-windows-msvc"

[target.i686-win7-windows-gnu]
# MinGW uses -municode so the CRT dispatches to wWinMain.
rustflags = ["-C", "link-arg=-municode"]

[target.i686-win7-windows-msvc]
# MSVC needs the wide GUI CRT entrypoint instead of the GNU -municode flag.
rustflags = ["-C", "link-arg=/ENTRY:wWinMainCRTStartup"]

[unstable]
build-std = ["core", "compiler_builtins"]
